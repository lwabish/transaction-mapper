name: Build Backend Image

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Setup ko
        uses: ko-build/setup-ko@v0.8

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract tag name
        id: extract_tag
        run: |
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build and publish docker image with ko
        run: |
          KO_DOCKER_REPO=${{ secrets.DOCKER_USERNAME }}/transaction-mapper \
          ko publish \
            --base-import-paths \
            --local \
            --tags ${{ env.TAG_NAME }} \
            --tags latest \
            ko://github.com/lwabish/transaction-mapper

      - name: Update ArgoCD image tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "✅ Backend image built and published: ${{ secrets.DOCKER_USERNAME }}/transaction-mapper:${{ env.TAG_NAME }}"
          echo "🔄 ArgoCD will automatically detect the new image tag and update the deployment"
          echo "📝 No code commit required - ArgoCD handles image updates automatically"
