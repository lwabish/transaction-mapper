name: Build Web Image

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tag name
        id: extract_tag
        run: |
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build push docker image
        uses: docker/build-push-action@v6.13.0
        with:
          context: "{{defaultContext}}:web"
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/transaction-mapper-web:${{ env.TAG_NAME }}
            ${{ secrets.DOCKER_USERNAME }}/transaction-mapper-web:latest

      - name: Update ArgoCD image tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "✅ Web image built and published: ${{ secrets.DOCKER_USERNAME }}/transaction-mapper-web:${{ env.TAG_NAME }}"
          echo "🔄 ArgoCD will automatically detect the new image tag and update the deployment"
          echo "📝 No code commit required - ArgoCD handles image updates automatically"
